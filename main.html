<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f0f2f5;
    }
    .container {
      background: #fff;
      padding: 30px 40px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
      width: 300px;
    }
    input[type="text"],
    input[type="password"] {
      width: 90%;
      padding: 8px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    input[type="checkbox"] {
      margin-right: 5px;
    }
    input[type="submit"],
    button {
      padding: 10px 15px;
      margin-top: 10px;
      border-radius: 5px;
      border: none;
      background-color: #3fa6a6;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button#existing {
      display: none; /* Hidden initially */
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Login Form</h1>
    <form id="login-form">
      <input type="text" id="username" placeholder="Username" required />
      <br/>
      <input type="password" id="password" placeholder="Password" required />
      <br/>
      <label>
        <input type="checkbox" id="checkbox" /> Remember me
      </label>
      <br/>
      <input type="submit" id="submit" value="Submit" />
    </form>
    <button id="existing">Login as existing user</button>
  </div>

  <script src="./script.js"></script>
</body>
</html>
